<!DOCTYPE html>
<html>
<head>
    <title>View Enquiries</title>
</head>
<body>

<h2>All Enquiry Records</h2>

<table border="1" cellpadding="10">
<tr>
    <th>SL No</th>
    <th>Name</th>
    <th>Mother</th>
    <th>Father</th>
    <th>Branch</th>
    <th>Phone</th>
    <th>Email</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[5] }}</td>
    <td>{{ row[9] }}</td>
    <td>{{ row[8] }}</td>
</tr>
{% endfor %}

</table>

<br>
<a href="/home">Back to Home</a>

</body>
</html>
